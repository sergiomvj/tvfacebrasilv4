# daily-production - Workflow
name: daily-production
squad: tv-facebrasil-squad
description: Produção diária de Shorts FaceBrasil
mode: mock-safe

schedule:
  interval: "*/30 * * * *"

steps:
  - id: fetch
    task: fetch-top-articles
    squad: facebrasil-bridge-squad
    params:
      limit: 5
      minViews: 50
      daysBack: 7
    output: articles

  - id: script
    task: generate-script
    squad: tv-facebrasil-squad
    forEach: articles
    output: scripts

  - id: video
    task: produce-video
    squad: tv-facebrasil-squad
    forEach: scripts
    output: videos

  - id: status
    task: check-status
    squad: tv-facebrasil-squad
    params:
      jobs: videos
      pollInterval: 30
      maxWait: 300
    output: completed

  - id: persist-status
    task: update-video-status
    squad: facebrasil-bridge-squad
    params:
      videos: completed
