# daily-production - Workflow
name: daily-production
squad: tv-facebrasil
description: Produção diária de Shorts FaceBrasil

schedule:
  interval: "*/30 * * * *"

steps:
  - task: fetch-top-articles
    params:
      limit: 5
      minViews: 50
      daysBack: 7
    output: articles

  - task: generate-short
    forEach: articles
    output: videos

  - task: check-status
    params:
      jobs: videos
      pollInterval: 30
      maxWait: 300
    output: completed

  - task: update-video-status
    params:
      videos: completed