# generate-short - Task
name: generate-short
squad: tv-facebrasil-squad
description: Transforma um artigo em Short 9:16 via HeyGen

inputs:
  - name: article
    type: object
    description: Artigo com title, content, category
  - name: avatar
    type: string
    description: ID do avatar
  - name: account
    type: string
    description: Conta HeyGen
  - name: maxDuration
    type: number
    default: 60

outputs:
  - name: video
    type: object
    description: Resultado da geração

steps:
  - agent: @scriptwriter
    task: generate_script
    input: article
    output: script

  - agent: @video-producer
    task: call_heygen
    input: { script, avatar, account, maxDuration }
    output: video
