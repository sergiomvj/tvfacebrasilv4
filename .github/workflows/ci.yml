name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests (mock mode)
        run: npm test
        env:
          TVFACEBRASIL_HEYGEN_MOCK: true
          TVFACEBRASIL_LLM_MOCK: true
          TVFACEBRASIL_SUPABASE_URL: https://mock.example.supabase.co
          TVFACEBRASIL_SUPABASE_ANON_KEY: mock-anon-key
          TVFACEBRASIL_SUPABASE_SERVICE_ROLE_KEY: mock-service-role-key